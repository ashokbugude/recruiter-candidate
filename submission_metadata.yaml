  has_network_during_ranking: false
  pre_computation_required: true
  pre_computation_time_minutes: 90

ai_tools_used:
  - "Cursor"
  - "Gemini"

ai_usage_summary: |
  Used Cursor for architecture, code generation, and refactoring.
  Gemini API used offline only for JD parsing and batch archetype labeling.
  No candidate data sent to LLMs during ranking runtime.

methodology_summary: |
  Hybrid retrieval (BM25 + BGE dense + RRF) feeds a LightGBM LambdaRank
  model trained on silver labels. Top-400 candidates are reranked with a
  BGE cross-encoder; fusion weights tuned via Optuna on silver proxy NDCG.
  Post-fusion modifiers penalize low availability, summary-template clones,
  and research titles without production evidence. Behavioral redrob_signals
  act as a multiplicative availability modifier with a hard cap in top-30.
  Ranking is CPU-only with no network in under 5 minutes.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
