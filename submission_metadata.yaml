ai_tools_used:
  - "Cursor"
  - "Gemini"

ai_usage_summary: |
  Used Cursor for architecture, code generation, and refactoring.
  Gemini API used offline only for JD parsing and batch archetype labeling.
  No candidate data sent to LLMs during ranking runtime.

methodology_summary: |
  Hybrid recall (BM25 + BGE dense + career RRF) pulls ~2K candidates; LightGBM
  LambdaRank scores with trap and behavioral penalties. Top-700 are reranked with
  BGE cross-encoder; CE/LTR/RRF fusion plus post-fusion modifiers (availability
  cap, template-clone limit, research-without-production) tuned via Optuna on
  silver proxy NDCG. Local audit on team_sarva_automata.csv: proxy NDCG@10 1.0,
  tier-5 in top 10/30/100 = 9/26/70, 0 honeypots in top-100. Embeddings and
  indexes are built offline (~90 min); rank.py runs CPU-only with no network.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
